  lead_en: The YOSHIO Lab designs supramolecular liquid crystals and polymer
    electrolytes that channel ions through self-assembled nanostructures. We
    translate this molecular control into electromechanical soft actuators,
    haptic devices, and energy materials at the intersection of chemistry, soft
    matter physics, and mechatronics.
  cta_research_ja: 研究を見る
  title_en: Designing Nanostructured Liquid Crystals and Polymers <br/>for
    Next-Generation Soft Actuators
  kicker_en: Molecular Mechatronics Group · NIMS / Hokkaido Univ.
  cta_contact_en: Contact Us
  lead_ja: 吉尾研究室では、超分子液晶やイオン伝導性高分子電解質を設計し、自己組織化ナノ構造の中をイオンが高速に流れる新しい物質群を創出しています。化学・ソフトマター物理・メカトロニクスの境界領域に立ち、電気駆動ソフトアクチュエータ、触覚デバイス、エネルギー材料の革新を目指します。
  title_ja: ナノ構造液晶・高分子の設計で<br/>次世代ソフトアクチュエータを拓く。
  cta_research_en: Explore Research
about:
  title_en: About the Lab
  title_ja: 研究室について
  p1_en: The YOSHIO Lab is the Molecular Mechatronics Group at the Research Center
    for Macromolecules and Biomaterials, National Institute for Materials
    Science (NIMS), led by Dr. Masafumi Yoshio, who concurrently serves as a
    Professor at the Graduate School of Chemical Sciences and Engineering,
    Hokkaido University (NIMS Joint Graduate School).
  p1_ja: 吉尾研究室は、物質・材料研究機構（NIMS）高分子・バイオ材料研究センター
    分子メカトロニクスグループとして活動しており、グループリーダーである吉尾正史博士は、北海道大学大学院 総合化学院
    物質化学コース（NIMS連係大学院）の教授を兼任しています。
  p2_en: We design supramolecular liquid crystals, ionic polymer electrolytes, and
    π-conjugated functional materials that exploit nanophase-separated
    self-assembly to control the transport of ions, electrons, and light. Our
    work bridges fundamental soft-matter chemistry with next-generation soft
    actuators, haptic interfaces, sensors, and energy devices.
  p2_ja: ナノ相分離自己組織化を活用して、イオン・電子・光の輸送を精密制御する超分子液晶、イオン性高分子電解質、π共役機能性材料を設計しています。基礎的なソフトマター化学と、次世代ソフトアクチュエータ・ハプティクスデバイス・センサ・エネルギーデバイスをつなぐ研究を推進しています。
