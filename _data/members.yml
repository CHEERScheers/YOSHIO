  - role_ja: 物質・材料研究機構 分子メカトロニクスグループ 博士研究員
    bio_en: "Research focus: design of ion-conductive liquid-crystalline polymer
      composites and phosphate columnar liquid crystals for electromechanical
      soft actuators and haptic devices. Recent first-author papers in Adv.
      Funct. Mater., ACS Appl. Mater. Interfaces, Sci. Technol. Adv. Mater., and
      Materials Today Chemistry."
    initial: L
    name_ja: 劉 成洋 博士
    bio_ja: 研究テーマ：イオン伝導性液晶／高分子コンポジット、リン酸エステル系カラムナー液晶を活用した電気駆動ソフトアクチュエータと触覚デバイスの開発。Adv.
      Funct. Mater.、ACS Appl. Mater. Interfaces、Sci. Technol. Adv.
      Mater.、Materials Today Chemistry 等に筆頭著者論文を発表。
    role_en: Postdoctoral Research Fellow, Molecular Mechatronics Group, NIMS
    photo: /assets/images/dscf9380.jpeg
    role_key: postdoc
    links:
