members:
  - role_ja: 物質・材料研究機構 高分子・バイオ材料研究センター 分子メカトロニクスグループ グループリーダー<br/>北海道大学大学院 総合化学院
      物質化学コース 教授（NIMS連係大学院）
    bio_en: "Research interests: supramolecules, liquid crystals, nanofibers, ion
      conductors, organic semiconductors, thermal conductivity, and
      mechanochromic luminescence. Awards include the SPSJ Mitsubishi Chemical
      Award (2024), the NIMS President's Award for Research Encouragement
      (2024), the JLCS Paper Award (2024, 2019), and the SPSJ Hitachi Chemical
      Award (2012)."
    initial: Y
    name_ja: 吉尾 正史 博士
    bio_ja: 専門は超分子・液晶・ナノファイバー・イオン伝導体・有機半導体・熱伝導・メカノクロミック発光。受賞歴：高分子学会三菱ケミカル賞（2024）、NIMS理事長賞研究奨励賞（2024）、日本液晶学会論文賞（2024,
      2019）、高分子学会日立化成賞（2012）、東京大学工学部ベストティーチングアワード（2014）など。
    role_en: Group Leader, Molecular Mechatronics Group, NIMS<br/>Professor
      (concurrent), Hokkaido University (NIMS Joint Graduate School)
    photo: /assets/images/img_6222.jpeg
    role_key: pi
    links:
