items:
  - date: "2026.04"
    title_en: "New paper published in ACS Applied Polymer Materials"
    title_ja: "ACS Applied Polymer Materials 誌に論文掲載"
    description_en: 'T. Ikeda and M. Yoshio, "Fluorinated Glycidyl Triazolyl Polymers Exhibiting Thermally Stable Layered Structures and Sticky Hydrophobic Surfaces," ACS Appl. Polym. Mater. (2026).'
    description_ja: "池田 大教先生と吉尾による論文「Fluorinated Glycidyl Triazolyl Polymers Exhibiting Thermally Stable Layered Structures and Sticky Hydrophobic Surfaces」が ACS Appl. Polym. Mater. に掲載されました（2026年）。"
    link: "https://doi.org/10.1021/acsapm.5c04519"
  - date: "2025.03"
    title_en: "Two papers published with Dr. Liu"
    title_ja: "劉博士との共同論文2報を発表"
    description_en: "C. Liu and M. Yoshio reported electroactive soft actuators using 3D Li-ion-conducting phosphate columnar liquid crystals (STAM) and ion-conductive LC gels (Materials Today Chemistry)."
    description_ja: "C. Liu と M. Yoshio による、3次元リチウムイオン伝導性リン酸エステル液晶を用いた電気活性ソフトアクチュエータ（STAM 誌）、およびイオン伝導性液晶ゲル（Materials Today Chemistry 誌）の研究論文を発表しました。"
    link: ""
  - date: "2024"
    title_en: "Triple awards in 2024"
    title_ja: "2024年に3件の受賞"
    description_en: "Prof. Yoshio received the SPSJ Mitsubishi Chemical Award, the NIMS President's Award for Research Encouragement, and the JLCS Paper Award."
    description_ja: "吉尾教授が高分子学会三菱ケミカル賞、NIMS理事長賞 研究奨励賞、日本液晶学会論文賞を受賞しました。"
    link: ""
  - date: "2024.05"
    title_en: "Cover paper in Adv. Funct. Mater."
    title_ja: "Adv. Funct. Mater. 誌に論文掲載"
    description_en: 'M. Yoshio, C.-H. Wu, C. Liu. "Mechanically Tough Micellar Cubic Liquid-Crystalline Polymer Electrolytes for Electromechanical Actuators," Adv. Funct. Mater. 34, 2314087 (2024).'
    description_ja: "M. Yoshio, C.-H. Wu, C. Liu. 「Mechanically Tough Micellar Cubic Liquid-Crystalline Polymer Electrolytes for Electromechanical Actuators」, Adv. Funct. Mater. 34, 2314087 (2024)."
    link: "https://doi.org/10.1002/adfm.202314087"
  - date: "2023.04"
    title_en: "JST PRESTO project launched"
    title_ja: "JSTさきがけ研究開始"
    description_en: 'Started a new JST PRESTO (Sakigake) research project, "Future mechatronics materials enabled by liquid-crystalline molecular alignment."'
    description_ja: "JST 戦略的創造研究推進事業さきがけ「液晶分子配列を生かした未来メカトロニクス材料の創出」プロジェクトを開始しました。"
    link: ""
